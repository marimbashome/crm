name: Vercel deploy ERROR → Slack

# Triggers after every push to main and any branch that hits production preview.
# Waits ~90s for Vercel to finish the build, queries Vercel API for the
# deployment matching the commit SHA, and if state === 'ERROR' POSTs to the
# Supabase edge function `vercel-deploy-error-notify` which formats and sends
# a Slack message to #ops-core.
#
# Why this exists: Vercel's built-in email notifications missed the 3 builds
# that took book.marimbashome.com off the QA pass for 6 weeks (Mar 24 → May 5).
# This workflow is the canary for `website` and `marimbas-guest-app`.

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  notify-on-error:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel build
        run: sleep 100

      - name: Query Vercel deployment by SHA
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TEAM_ID: team_Fg1MXTOak1GcwELAM4lCDpsS
          PROJECT_ID: prj_e9V3K5gmzK5l8CxYKA2OKb3zWcs0
          SHA: ${{ github.sha }}
        run: |
          set -e
          # Try up to 6 times (10min total) — large repos sometimes take longer
          for attempt in 1 2 3 4 5 6; do
            RESP=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?teamId=$TEAM_ID&projectId=$PROJECT_ID&limit=20")

            # Find the deployment matching this commit SHA
            DEPLOY=$(echo "$RESP" | jq -r --arg sha "$SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha)' | head -c 100000)

            if [ -n "$DEPLOY" ] && [ "$DEPLOY" != "null" ]; then
              STATE=$(echo "$DEPLOY" | jq -r '.state')
              # If still BUILDING or QUEUED, wait and retry
              if [ "$STATE" = "BUILDING" ] || [ "$STATE" = "QUEUED" ] || [ "$STATE" = "INITIALIZING" ]; then
                echo "attempt $attempt: state=$STATE, waiting 60s..."
                sleep 60
                continue
              fi

              # Terminal state — extract everything we need
              echo "deploy_id=$(echo "$DEPLOY" | jq -r '.uid // .id')" >> $GITHUB_OUTPUT
              echo "deploy_state=$STATE" >> $GITHUB_OUTPUT
              echo "deploy_url=$(echo "$DEPLOY" | jq -r '.url')" >> $GITHUB_OUTPUT
              echo "inspector_url=$(echo "$DEPLOY" | jq -r '.inspectorUrl // empty')" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
              echo "Found deployment: state=$STATE"
              exit 0
            fi
            echo "attempt $attempt: no matching deployment yet, waiting 60s..."
            sleep 60
          done
          echo "found=false" >> $GITHUB_OUTPUT
          echo "::warning::Could not find Vercel deployment for SHA $SHA after 10min"

      - name: POST to Supabase edge function (only if state == ERROR)
        if: steps.vercel.outputs.found == 'true' && steps.vercel.outputs.deploy_state == 'ERROR'
        env:
          MARIMBAS_ADMIN_TOKEN: ${{ secrets.MARIMBAS_ADMIN_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.event.repository.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          DEPLOY_ID: ${{ steps.vercel.outputs.deploy_id }}
          DEPLOY_STATE: ${{ steps.vercel.outputs.deploy_state }}
          DEPLOY_URL: ${{ steps.vercel.outputs.deploy_url }}
          INSPECTOR_URL: ${{ steps.vercel.outputs.inspector_url }}
        run: |
          set -e
          # Build payload via jq to escape COMMIT_MSG safely
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg sha "$SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg author "$COMMIT_AUTHOR" \
            --arg deploy_id "$DEPLOY_ID" \
            --arg deploy_state "$DEPLOY_STATE" \
            --arg deploy_url "$DEPLOY_URL" \
            --arg inspector_url "$INSPECTOR_URL" \
            '{repo: $repo, commit_sha: $sha, commit_message: $msg, commit_author: $author, deploy_id: $deploy_id, deploy_state: $deploy_state, deploy_url: $deploy_url, inspector_url: $inspector_url}')

          curl -fsS -X POST \
            -H "Authorization: Bearer $MARIMBAS_ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://xqjjdopwinljrnxexpwd.supabase.co/functions/v1/vercel-deploy-error-notify

          echo "::notice::Slack notification sent to #ops-core for ERROR deploy $DEPLOY_ID"

      - name: Log success (state was READY or other non-error)
        if: steps.vercel.outputs.found == 'true' && steps.vercel.outputs.deploy_state != 'ERROR'
        run: echo "::notice::Vercel deploy state=${{ steps.vercel.outputs.deploy_state }} — no Slack alert sent"
